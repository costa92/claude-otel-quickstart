receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 2s
    send_batch_size: 1000
  # 高基数标识只从 metrics 删掉(防 Prometheus series 爆炸),logs 管道保留它们做关联。
  # process.pid 由用户 shell 注入(OTEL_RESOURCE_ATTRIBUTES="process.pid=$$"),是 resource 级;
  # session.id 是 datapoint 级 — 两个上下文都清掉才稳妥。
  transform/drop_high_cardinality_from_metrics:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - delete_key(attributes, "process.pid")
          - delete_key(attributes, "session.id")
      - context: datapoint
        statements:
          - delete_key(attributes, "process.pid")
          - delete_key(attributes, "session.id")

exporters:
  # metrics → Prometheus 原生 OTLP receive
  otlphttp/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true
  # logs → Loki 原生 OTLP receive (用 http+json,实测 protobuf 在 Loki 3.3 静默 drop)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    encoding: json
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [transform/drop_high_cardinality_from_metrics, batch]
      exporters: [otlphttp/prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
